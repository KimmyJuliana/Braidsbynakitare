        :root { 
            --main-gold: #c5a059; 
            --dark-brown: #1a1a1a; 
            --soft-beige: #fdfaf5; 
            --white: #ffffff;
        }

        body { 
            font-family: 'Helvetica Neue', sans-serif; 
            margin: 0; 
            background-color: var(--soft-beige); 
            color: var(--dark-brown);
        }

        header { 
            background: var(--dark-brown); 
            color: white; 
            padding: 2rem 1rem; 
            text-align: center; 
        }

        header h1 { 
            margin: 0; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            color: var(--main-gold); 
            font-size: 2.5rem;
        }

        nav {
            background: #2a2a2a;
            text-align: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--main-gold);
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            padding: 40px 20px; 
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--dark-brown);
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--main-gold);
            border-bottom: 2px solid var(--main-gold);
            padding-bottom: 10px;
            margin-top: 40px;
            text-transform: uppercase;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 20px;
        }

        .category-card { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .category-card h3 { 
            color: var(--dark-brown); 
            border-bottom: 2px solid var(--main-gold); 
            padding-bottom: 5px;
            margin-top: 0;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--main-gold);
            margin-top: auto;
            padding-top: 15px;
        }

        .etc-card {
            border: 2px dashed var(--main-gold);
            background: transparent;
        }
